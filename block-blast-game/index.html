<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="screen-start">
    <!-- Background Audio -->
    <audio id="bg-music" loop>
        <!-- Using a free placeholder lo-fi style loop -->
        <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_2d81f14309.mp3?filename=lofi-study-112191.mp3" type="audio/mpeg">
    </audio>

    <div id="app-container">
        
        <!-- START SCREEN -->
        <div id="start-screen" class="screen">
            <div class="title-container">
                <h1>BLOCK<br><span class="highlight">BLAST</span></h1>
            </div>
            
            <div class="menu-balance">
                <span class="gem-icon">💎</span>
                <span id="menu-gem-count">0</span>
            </div>

            <div class="menu-buttons">
                <button id="btn-play" class="btn-primary">PLAY</button>
                <button id="btn-shop" class="btn-secondary">SHOP</button>
                <div class="toggle-container">
                    <span>Music</span>
                    <label class="switch">
                        <input type="checkbox" id="music-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- SHOP SCREEN -->
        <div id="shop-screen" class="screen hidden">
            <div class="shop-header">
                <h2>THEME SHOP</h2>
                <div class="menu-balance">
                    <span class="gem-icon">💎</span>
                    <span id="shop-gem-count">0</span>
                </div>
            </div>
            <div id="themes-list" class="themes-grid">
                <!-- Generated by JS -->
            </div>
            <button id="btn-shop-back" class="btn-secondary">BACK</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-container" class="screen hidden">
            <header>
                <div class="stats-row">
                    <div class="score-container">
                        <div class="score-label">SCORE</div>
                        <div id="score">0</div>
                    </div>
                    <div class="score-container">
                        <div class="score-label">GEMS</div>
                        <div id="game-gem-count" class="gem-display">0</div>
                    </div>
                    <div class="score-container best-score">
                        <div class="score-label">BEST</div>
                        <div id="best-score">0</div>
                    </div>
                </div>
            </header>

        <main>
            <div id="board">
                <!-- 8x8 grid will be generated by JS -->
            </div>
        </main>

        <footer>
            <div id="shapes-container">
                <!-- 3 draggable shapes will be generated by JS -->
            </div>
        </footer>

        <div id="game-over" class="hidden">
            <div class="game-over-content">
                <h2>Game Over!</h2>
                <div class="final-score">Score: <span id="final-score-val">0</span></div>
                
                <div class="game-over-actions">
                    <button id="revive-btn" class="btn-special">
                        Continue (5 <span class="gem-icon">💎</span>)
                    </button>
                    <button id="restart-btn" class="btn-primary">Restart</button>
                    <button id="quit-btn" class="btn-secondary">Main Menu</button>
                </div>
            </div>
        </div>
    </div> <!-- end game container -->
    
    </div> <!-- end app container -->

    <script src="script.js"></script>
</body>

</html>
