<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake IO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-layer">
            <div id="score-container">
                Length: <span id="length-display">10</span> | Score: <span id="score-display">0</span>
            </div>
            
            <div id="leaderboard">
                <h3>Top Snakes</h3>
                <ul id="leaderboard-list"></ul>
            </div>
            
            <div id="start-screen" class="overlay screen active">
                <div class="panel">
                    <h1>SNAKE IO</h1>
                    <p>Move mouse to steer. Eat orbs to grow. Don't hit other snakes!</p>
                    <input type="text" id="player-name" placeholder="Enter your name" maxlength="15" value="Player">
                    <button class="btn" id="start-btn">PLAY</button>
                </div>
            </div>
            
            <div id="game-over-screen" class="overlay screen hidden">
                <div class="panel">
                    <h2>Game Over!</h2>
                    <p>You reached length: <span id="final-length">0</span></p>
                    <p>Final Score: <span id="final-score">0</span></p>
                    <button class="btn" id="restart-btn">PLAY AGAIN</button>
                </div>
            </div>
            
            <div id="minimap-container">
                <canvas id="minimap-canvas"></canvas>
            </div>
        </div>
    </div>
    
    <script src="js/food.js"></script>
    <script src="js/snake.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
