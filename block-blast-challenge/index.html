<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google AntiGravity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="themes.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container" class="theme-void">
        <!-- Background Layers -->
        <div id="background-layer"></div>
        <div id="interactive-layer"></div>
        <canvas id="effects-canvas"></canvas>

        <!-- UI Header -->
        <header id="ui-header">
            <div class="score-container">
                <span class="score-label">SCORE</span>
                <span id="score-display">0</span>
            </div>
            <div class="theme-indicator">
                <div class="high-score-container">
                    <span class="high-score-label">REKOR</span>
                    <span id="high-score-display">0</span>
                </div>
                <span id="current-theme-name">THE VOID</span>
                <div class="progress-bar-container">
                    <div id="theme-progress-bar"></div>
                </div>
            </div>
        </header>

        <!-- Main Game Area -->
        <main id="main-area">
            <div id="grid-container">
                <!-- 10x10 Grid generated by JS -->
            </div>
        </main>

        <!-- Block Spawner Area (Bottom) -->
        <footer id="spawner-area">
            <div class="spawner-slot" id="slot-1"></div>
            <div class="spawner-slot" id="slot-2"></div>
            <div class="spawner-slot" id="slot-3"></div>
        </footer>

        <!-- Overlays -->
        <div id="game-over-overlay" class="hidden">
            <h1 id="game-over-title">GAME OVER</h1>
            <p id="game-over-reason">No moves left</p>
            <p class="final-score">Final Score: <span id="final-score-display">0</span></p>
            <button id="restart-btn">Restart Journey</button>
        </div>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/themeManager.js"></script>
    <script src="js/game.js"></script>
</body>

</html>
