<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Sudoku</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="game-container">
            <header>
                <h1>Infinite Sudoku</h1>
                <div class="stats">
                    <div class="stat-box">
                        <span class="label">Score</span>
                        <span class="value" id="score">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">Lives</span>
                        <span class="value" id="lives">
                            <span class="heart active">❤️</span>
                            <span class="heart active">❤️</span>
                            <span class="heart active">❤️</span>
                        </span>
                    </div>
                </div>
            </header>

            <main>
                <div id="sudoku-board">
                    <!-- Blocks will be injected here by JS -->
                </div>

                <div id="numpad">
                    <!-- Numbers 1-9 -->
                    <button class="num-btn" data-val="1">1</button>
                    <button class="num-btn" data-val="2">2</button>
                    <button class="num-btn" data-val="3">3</button>
                    <button class="num-btn" data-val="4">4</button>
                    <button class="num-btn" data-val="5">5</button>
                    <button class="num-btn" data-val="6">6</button>
                    <button class="num-btn" data-val="7">7</button>
                    <button class="num-btn" data-val="8">8</button>
                    <button class="num-btn" data-val="9">9</button>
                    <button class="num-btn action-btn" id="erase-btn" title="Erase selection">⌫</button>
                </div>
            </main>

            <div id="game-over-screen" class="overlay hidden">
                <div class="modal">
                    <h2>Game Over</h2>
                    <p>Your mind has expanded, but out of lives.</p>
                    <div class="final-score-box">
                        <span>Final Score</span>
                        <h3 id="final-score">0</h3>
                    </div>
                    <button id="restart-btn" class="primary-btn">Play Again</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
